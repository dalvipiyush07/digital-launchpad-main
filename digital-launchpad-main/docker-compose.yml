services:

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudbuild_frontend
    restart: unless-stopped
    networks:
      - app_network

  # Admin Express Server
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: cloudbuild_admin
    restart: unless-stopped
    env_file: .env
    volumes:
      - admin_uploads:/app/public/uploads
      - admin_data:/app/data
    networks:
      - app_network

  # Nginx Reverse Proxy (HTTP + HTTPS)
  nginx:
    image: nginx:alpine
    container_name: cloudbuild_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - admin
    networks:
      - app_network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: cloudbuild_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  admin_uploads:
  admin_data:
  certbot_www:
  certbot_certs:

networks:
  app_network:
    driver: bridge
