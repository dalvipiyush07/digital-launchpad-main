# HTTP → HTTPS redirect + certbot challenge
server {
    listen 80;
    server_name cloudbuild.tech www.cloudbuild.tech admin.cloudbuild.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main Website
server {
    listen 443 ssl;
    server_name cloudbuild.tech www.cloudbuild.tech;

    ssl_certificate     /etc/letsencrypt/live/cloudbuild.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudbuild.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/font-woff2;

    # iPhone/Safari fix
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/ {
        proxy_pass         http://cloudbuild_admin:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /uploads/ {
        proxy_pass         http://cloudbuild_admin:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass         http://cloudbuild_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}

# HTTPS — Admin Panel
server {
    listen 443 ssl;
    server_name admin.cloudbuild.tech;

    ssl_certificate     /etc/letsencrypt/live/cloudbuild.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudbuild.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://cloudbuild_admin:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
