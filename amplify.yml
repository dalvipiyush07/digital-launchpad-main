version: 1
applications:
  - appRoot: digital-launchpad-main
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: '**/*'
          headers:
            - key: 'Cache-Control'
              value: 'no-cache'
        - pattern: '/assets/**'
          headers:
            - key: 'Cache-Control'
              value: 'public, max-age=31536000, immutable'
